<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            --bg-color: #f9fafb;
            --text-color: #1a1a1a;
            --sidebar-bg: #ffffff;
            --border-color: #e5e7eb;
            --card-bg: #ffffff;
            --muted-text: #4b5563;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        body.dark-mode {
            --bg-color: #0d0d0d;
            --text-color: #d1d1d1;
            --sidebar-bg: #1a1a1a;
            --border-color: #333;
            --card-bg: #1a1a1a;
            --muted-text: #9ca3af;
        }

        /* Loader Overlay */
        #loader-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        
        .ai-matrix-loader { width: 120px; height: 160px; margin: 30px auto; position: relative; perspective: 800px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .digit { color: #00ff88; font-family: monospace; font-size: 18px; text-align: center; text-shadow: 0 0 5px #00ff88; animation: matrix-fall 2s infinite, matrix-flicker 0.5s infinite; opacity: 0; }
        .digit:nth-child(1) { animation-delay: 0.1s; } .digit:nth-child(2) { animation-delay: 0.3s; }
        .digit:nth-child(3) { animation-delay: 0.5s; } .digit:nth-child(4) { animation-delay: 0.7s; }
        .digit:nth-child(5) { animation-delay: 0.9s; } .digit:nth-child(6) { animation-delay: 1.1s; }
        .digit:nth-child(7) { animation-delay: 1.3s; } .digit:nth-child(8) { animation-delay: 1.5s; }
        .glow { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%); animation: matrix-pulse 2s infinite; }
        @keyframes matrix-fall { 0% { transform: translateY(-50px) rotateX(90deg); opacity: 0; } 20%, 80% { transform: translateY(0) rotateX(0deg); opacity: 0.8; } 100% { transform: translateY(50px) rotateX(-90deg); opacity: 0; } }
        @keyframes matrix-flicker { 0%, 19%, 21%, 100% { opacity: 0.8; } 20% { opacity: 0.2; } }
        @keyframes matrix-pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

        .sidebar { width: 280px; background-color: var(--sidebar-bg); padding: 20px; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; transition: background-color 0.3s; }
        .profile-img { width: 120px; height: 120px; background-color: #333; border-radius: 50%; margin-bottom: 15px; border: 2px solid #00ff41; }
        .name { font-weight: 800; font-size: 1.25rem; color: var(--text-color); margin-bottom: 5px;}
        .profession { font-size: 0.9rem; font-weight: 600; color: var(--muted-text); margin-bottom: 30px; }
        .nav-links { list-style: none; padding: 0; width: 100%; display: flex; flex-direction: column; gap: 15px; align-items: center;}
        
        .content-wrapper { padding: 40px; flex-grow: 1; padding-top: 60px; }
        .card { background-color: var(--card-bg); padding: 60px 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); max-width: 850px; width: 100%; height: fit-content; border: 1px solid var(--border-color); text-align: left; margin: 0 auto; }

        .switch-container { position: fixed; bottom: 20px; right: 20px; }
        .ui-switch { --switch-bg: rgb(135, 150, 165); --switch-width: 48px; --switch-height: 20px; --circle-diameter: 32px; --circle-bg: rgb(0, 56, 146); --circle-inset: calc((var(--circle-diameter) - var(--switch-height)) / 2); }
        .ui-switch input { display: none; }
        .slider { -webkit-appearance: none; appearance: none; width: var(--switch-width); height: var(--switch-height); background: var(--switch-bg); border-radius: 999px; position: relative; cursor: pointer; }
        .slider .circle { top: calc(var(--circle-inset) * -1); left: 0; width: var(--circle-diameter); height: var(--circle-diameter); position: absolute; background: var(--circle-bg); border-radius: inherit; background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIGhlaWdodD0iMjAiIHdpZHRoPSIyMCIgdmlld0JveD0iMCAwIDIwIDIwIj4KICAgIDxwYXRoIGZpbGw9IiNmZmYiCiAgICAgICAgZD0iTTkuMzA1IDEuNjY3VjMuNzVoMS4zODlWMS42NjdoLTEuMzl6bS00LjcwNyAxLjk1bC0uOTgyLjk4Mkw1LjA5IDYuMDcybC45ODItLjk4Mi0xLjQ3My0xLjQ3M3ptMTAuODAyIDBMMTMuOTI3IDUuMDlsLjk4Mi45ODIgMS40NzMtMS40NzMtLjk4Mi0uOTgyek0xMCA1LjEzOWE0Ljg3MiA0Ljg3MiAwIDAwLTQuODYyIDQuODZBNC44NzIgNC44NzIgMCAwMDEwIDE0Ljg2MiA0Ljg3MiA0Ljg3MiAwIDAwMTQuODYgMTAgNC44NzIgNC44NzIgMCAwMDEwIDUuMTM5em0wIDEuMzg5QTMuNDYyIDMuNDYyIDAgMDExMy40NzEgMTBhMy40NjIgMy40NjIgMCAwMS0zLjQ3MyAzLjQ3MkEzLjQ2MiAzLjQ2MiAwIDAxNi41MjcgMTAgMy40NjIgMy40NjIgMCAwMTEwIDYuNTI4ek0xLjY2NSA5LjMwNXYxLjM5aDIuMDgzdi0xLjM5SDEuNjY2em0xNC41ODMgMHYxLjM5aDIuMDg0di0xLjM5aC0yLjA4NHpNNS4wOSAxMy45MjhMMy42MTYgMTUuNGwuOTgyLjk4MiAxLjQ3My0xLjQ3My0uOTgyLS45ODJ6bTkuODIgMGwtLjk4Mi45ODIgMS40NzMgMS40NzMuOTgyLS45ODItMS40NzMtMS40NzN6TTkuMzA1IDE2LjI1djIuMDgzaDEuMzg5VjE2LjI1aC0xLjM5eiIgLz4KPC9zdmc+"); background-repeat: no-repeat; background-position: center center; transition: left 150ms cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; box-shadow: 0px 2px 1px -1px rgba(0,0,0,0.2); }
        .ui-switch input:checked+.slider .circle { left: calc(100% - var(--circle-diameter)); background-image: url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIGhlaWdodD0iMjAiIHdpZHRoPSIyMCIgdmlld0JveD0iMCAwIDIwIDIwIj4KICAgIDxwYXRoIGZpbGw9IiNmZmYiCiAgICAgICAgZD0iTTQuMiAyLjVsLS43IDEuOC0xLjguNyAxLjguNy43IDEuOC42LTEuOEw2LjcgNWwtMS45LS43LS42LTEuOHptMTUgOC4zYTYuNyA2LjcgMCAxMS02LjYtNi42IDUuOCA1LjggMCAwMDYuNiA2LjZ6IiAvPgo8L3N2Zz4="); }
    </style>
</head>
<body>

<!-- Loader Overlay -->
<div id="loader-overlay">
    <div class="ai-matrix-loader">
        <div class="digit">1</div><div class="digit">0</div><div class="digit">1</div>
        <div class="digit">0</div><div class="digit">1</div><div class="digit">0</div>
        <div class="digit">1</div><div class="digit">1</div>
        <div class="glow"></div>
    </div>
</div>

<div class="sidebar">
    <div class="profile-img"><img src="profile.jpg" alt="Mickael Benlolo" style="width:100%"></div>
    <div class="name">Mickael Benlolo</div>
    <div class="profession">AppSec & Pentester</div>
    
    <div class="nav-links">
        <a class="nav-link group flex items-center justify-center rounded-lg border border-green-600 bg-green-600 px-5 py-3 transition-colors hover:bg-transparent w-full" href="index.html"><span class="font-medium text-white group-hover:text-green-500">Home</span></a>
        <a class="nav-link group flex items-center justify-center rounded-lg border border-green-600 px-5 py-3 text-green-500 transition-colors hover:bg-green-600 w-full" href="aboutme.html"><span class="font-medium group-hover:text-white">About Me</span></a>
        <a class="nav-link group flex items-center justify-center rounded-lg border border-green-600 px-5 py-3 text-green-500 transition-colors hover:bg-green-600 w-full" href="blog.html"><span class="font-medium group-hover:text-white">Blog</span></a>
        <a class="nav-link group flex items-center justify-center rounded-lg border border-green-600 px-5 py-3 text-green-500 transition-colors hover:bg-green-600 w-full" href="certificates.html"><span class="font-medium group-hover:text-white">Certificates</span></a>
        <a class="nav-link group flex items-center justify-center rounded-lg border border-green-600 px-5 py-3 text-green-500 transition-colors hover:bg-green-600 w-full" href="contact.html"><span class="font-medium group-hover:text-white">Contact</span></a>
    </div>
</div>

<div class="content-wrapper">
    <div class="card">
        <h1 class="text-3xl font-bold">Welcome to my Laboratory</h1>
        <p class="mt-4">This is where my write-ups, research, and professional journey live.</p>
    </div>
</div>

<label class="ui-switch switch-container">
    <input type="checkbox" id="themeToggle">
    <div class="slider"><div class="circle"></div></div>
</label>

<script>
    const toggle = document.getElementById('themeToggle');
    toggle.addEventListener('change', () => document.body.classList.toggle('dark-mode'));

    // Navigation Loader
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', function(e) {
            const target = this.getAttribute('href');
            // Only show loader if we are going to a different file
            if (target && target !== window.location.pathname.split("/").pop()) {
                e.preventDefault();
                document.getElementById('loader-overlay').style.display = 'flex';
                setTimeout(() => { window.location.href = target; }, 1200);
            }
        });
    });
</script>

</body>
</html>
